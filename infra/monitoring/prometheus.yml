global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'kavalx-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: /metrics

  - job_name: 'kavalx-tis'
    static_configs:
      - targets: ['txn-intelligence:8001']

  - job_name: 'kavalx-apk'
    static_configs:
      - targets: ['apk-analysis:8002']

  - job_name: 'kavalx-gis'
    static_configs:
      - targets: ['graph-intelligence:8003']

  - job_name: 'kavalx-bio'
    static_configs:
      - targets: ['biometrics:8004']

  - job_name: 'kavalx-amadp'
    static_configs:
      - targets: ['amadp:8005']

  - job_name: 'kavalx-osint'
    static_configs:
      - targets: ['osint:8006']

  - job_name: 'kavalx-compliance'
    static_configs:
      - targets: ['compliance:8007']

  - job_name: 'kavalx-fl'
    static_configs:
      - targets: ['fl-coordinator:8008']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

rule_files:
  - '/etc/prometheus/alerts.yml'
